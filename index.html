<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando Simulador Biomédico...</title>
    <style>body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }</style>
</head>
<body>
    <iframe id="monitor" src="" style="width:100%; height:100%; border:none;"></iframe>

    <script>
        fetch('link.json?v=' + Date.now())
            .then(response => response.json())
            .then(data => {
                document.getElementById('monitor').src = data.url;
            });
    </script>
</body>
</html>
